          <label class="recipe-modal-form-label">解決方式</label>
          <textarea class="recipe-modal-textarea" name="pair-solution" rows="2"
            placeholder="描述解決方式…">${escapeHTML(p.solution || "")}</textarea>
        </div>
      </div>`).join("");
    return `
      <div id="${prefix}-pairs-container">${itemsHTML}</div>
      <button type="button" class="pair-add-btn" onclick="addPair('${prefix}')">＋ 新增問題</button>`;
  }

  function addPair(prefix) {
    const container = document.getElementById(prefix + "-pairs-container");
    if (!container) return;
    const index = container.children.length;
    const div = document.createElement("div");
    div.className = "pair-form-item";
    div.dataset.index = index;
    div.innerHTML = `
      <div class="pair-form-header">
        <span class="pair-form-number">問題 ${index + 1}</span>
        <button type="button" class="pair-delete-btn" onclick="removePair('${prefix}', ${index})">✕ 刪除</button>
      </div>
      <div class="recipe-modal-form-group">
        <label class="recipe-modal-form-label">問題描述</label>
        <textarea class="recipe-modal-textarea" name="pair-problem" rows="3"
          placeholder="描述實作過程中遇到的困難…"></textarea>
      </div>
      <div class="recipe-modal-form-group" style="margin-bottom:0">
        <label class="recipe-modal-form-label">解決方式</label>
        <textarea class="recipe-modal-textarea" name="pair-solution" rows="2"
          placeholder="描述解決方式…"></textarea>
      </div>`;
    container.appendChild(div);
  }

  function removePair(prefix, index) {
    const container = document.getElementById(prefix + "-pairs-container");
    if (!container || container.children.length <= 1) return;
    container.children[index].remove();
    // 重新編號
    Array.from(container.children).forEach((item, i) => {
      item.dataset.index = i;
      item.querySelector(".pair-form-number").textContent = `問題 ${i + 1}`;
      item.querySelector(".pair-delete-btn").setAttribute("onclick", `removePair('${prefix}', ${i})`);
    });
  }

  function collectPairs(prefix) {
    const container = document.getElementById(prefix + "-pairs-container");
    if (!container) return [];
    return Array.from(container.children).map(item => ({
      problem:  item.querySelector("[name='pair-problem']").value,
      solution: item.querySelector("[name='pair-solution']").value
    })).filter(p => p.problem.trim() || p.solution.trim());
  }

  // ── end 問題配對組 helpers ──────────────────────────────────────────────

  function cancelEdit() {
    if (_currentRecipeDetail) renderRecipeDetail(_currentRecipeDetail);
  }

  async function saveEdit() {
    const btn = document.getElementById("edit-save-btn");
    btn.disabled    = true;
    btn.textContent = "儲存中…";

    const productId = _currentRecipeDetail.product.id;
    const product = {
      name:        document.getElementById("edit-name").value,
      description: document.getElementById("edit-description").value,
      tags:        getMultiselectValue('edit-tags-ms'),
      designer:    getMultiselectValue('edit-designer-ms'),
      deployLink:  document.getElementById("edit-deployLink").value
    };
    const devNote = {
      aiTips: document.getElementById("edit-aiTips").value,
      pairs:  collectPairs("edit")
    };

    try {
      // 1. 儲存產品資料
      const resp = await fetch(GAS_URL, {
        method:   "POST",
        headers:  { "Content-Type": "text/plain" },
        body:     JSON.stringify({ action: "updateProductDetail", productId, product, devNote }),
        redirect: "follow"
      });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      // 2. 刪除標記為待刪的既有圖片
      const toDelete = _editMediaState.items.filter(i => i.id !== null && i.markedForDeletion);
      for (const item of toDelete) {
        btn.textContent = "刪除圖片中…";
        await fetch(GAS_URL, {
          method:   "POST",
          headers:  { "Content-Type": "text/plain" },
          body:     JSON.stringify({ action: "deleteProductMedia", mediaId: item.id }),
          redirect: "follow"
        });
      }

      // 3. 上傳新圖片
      const toAdd    = _editMediaState.items.filter(i => i.id === null && !i.markedForDeletion);
      const newMedia = [];
      const baseOrder = (_currentRecipeDetail.media || []).filter(m =>
        !toDelete.some(d => d.id === m.id)
      ).length;

      for (let i = 0; i < toAdd.length; i++) {
        btn.textContent = `上傳圖片中… (${i + 1}/${toAdd.length})`;
        const item = toAdd[i];
        const uploadResp = await fetch(GAS_URL, {
          method:   "POST",
          headers:  { "Content-Type": "text/plain" },
          body:     JSON.stringify({
            action:      "uploadProductImage",
            productId,
            imageBase64: item.base64,
            mimeType:    item.mimeType,
            description: item.description,
            order:       baseOrder + i
          }),
          redirect: "follow"
        });
        if (!uploadResp.ok) throw new Error("上傳圖片失敗 HTTP " + uploadResp.status);
        const uploadData = await uploadResp.json();
        if (uploadData.error) throw new Error(uploadData.error);
        newMedia.push({
          id:          uploadData.mediaId,
          imageUrl:    uploadData.imageUrl,
          description: item.description,
          order:       baseOrder + i
        });
      }

      // 4. 更新記憶體內的資料並回到瀏覽模式
      _currentRecipeDetail.product = { ..._currentRecipeDetail.product, ...product };
      if (_currentRecipeDetail.devNotes.length > 0) {
        _currentRecipeDetail.devNotes[0] = { ..._currentRecipeDetail.devNotes[0], ...devNote };
      } else {
        _currentRecipeDetail.devNotes = [{ id: "", ...devNote }];
      }
      const deletedIds = new Set(toDelete.map(i => i.id));
      _currentRecipeDetail.media = [
        ...(_currentRecipeDetail.media || []).filter(m => !deletedIds.has(m.id)),
        ...newMedia
      ];

      // 5. 同步更新食譜卡片列表
      const idx = recipesState.products.findIndex(p => p.id === productId);
      if (idx !== -1) {
        recipesState.products[idx] = { ...recipesState.products[idx], ...product };
        renderRecipeCards();
      }

      renderRecipeDetail(_currentRecipeDetail);
    } catch (err) {
      btn.disabled    = false;
      btn.textContent = "儲存";
      const errEl = document.createElement("div");
      errEl.className   = "error-msg";
      errEl.style.marginTop = "12px";
      errEl.textContent = "⚠️ 儲存失敗：" + err.message;
      btn.closest(".recipe-edit-actions").insertAdjacentElement("afterend", errEl);
    }
  }

  // ── 新增食譜 ─────────────────────────────────────────────────────────────

  function openAddRecipeModal() {
    const overlay = document.getElementById("recipe-modal-overlay");

    _currentRecipeDetail = null; // 清除目前瀏覽的產品
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";

    // 重置並渲染可編輯輪播（空白，顯示上傳區域）
    _editMediaState = { items: [], current: 0 };
    renderEditableCarousel();

    enterAddMode();
  }

  function enterAddMode() {
    document.getElementById("recipe-modal-content").innerHTML = `
      <div class="recipe-modal-form-group">
        <label class="recipe-modal-form-label">產品名稱</label>
        <input class="recipe-modal-input" id="add-name" placeholder="輸入產品名稱">
      </div>
      <div class="recipe-modal-form-group">
        <label class="recipe-modal-form-label">產品簡介</label>
        <textarea class="recipe-modal-textarea" id="add-description" rows="3" placeholder="簡短描述這個產品做什麼"></textarea>
      </div>
      <div class="recipe-modal-form-group">
        <label class="recipe-modal-form-label">技術標籤</label>
        <div class="tag-multiselect" id="add-tags-ms"></div>
      </div>
      <div class="recipe-modal-form-group">
        <label class="recipe-modal-form-label">設計者</label>
        <div class="tag-multiselect" id="add-designer-ms"></div>
      </div>
      <div class="recipe-modal-form-group">
        <label class="recipe-modal-form-label">部署連結</label>
        <input class="recipe-modal-input" id="add-deployLink" type="url" placeholder="https://...">
      </div>
      <div class="recipe-modal-divider"></div>
      <div class="recipe-modal-form-group">
        <label class="recipe-modal-form-label">怎麼跟 AI 溝通</label>
        <textarea class="recipe-modal-textarea" id="add-aiTips" rows="4" placeholder="描述如何跟 AI 溝通才能完成這個產品…"></textarea>
      </div>
      <div class="recipe-modal-form-group">
        <label class="recipe-modal-form-label">實作遇到的問題 與 解決方式</label>
        ${renderPairsFormHTML([], "add")}
      </div>
      <div class="recipe-edit-actions">
        <button class="recipe-cancel-btn" onclick="closeRecipeDetail()">取消</button>
        <button class="recipe-save-btn" id="add-save-btn" onclick="saveNewRecipe()">新增</button>
      </div>
    `;

    // 初始化技術標籤多選下拉框（允許新增自訂標籤）
    const techOptions = recipesState.technologies.map(t => t.name);
    initMultiselect('add-tags-ms', techOptions, [], '選擇或新增技術標籤…', true);

    // 初始化設計者多選下拉框
    const designerOptions = [...new Set(
      recipesState.products.map(p => p.designer).filter(Boolean)
    )];
    initMultiselect('add-designer-ms', designerOptions, [], '選擇設計者…');
  }

  async function saveNewRecipe() {
    const nameEl = document.getElementById("add-name");
    const name   = nameEl.value.trim();

    if (!name) {
      nameEl.style.borderColor = "#E85B4A";
      nameEl.focus();
      return;
    }

    const btn = document.getElementById("add-save-btn");
    btn.disabled    = true;
    btn.textContent = "新增中…";

    const product = {
      name,
      description: document.getElementById("add-description").value,
      tags:        getMultiselectValue('add-tags-ms'),
      designer:    getMultiselectValue('add-designer-ms'),
      deployLink:  document.getElementById("add-deployLink").value
    };
    const devNote = {
      aiTips: document.getElementById("add-aiTips").value,
      pairs:  collectPairs("add")
    };
    // 取出在前端新增、尚未存在於 Technologies 工作表的標籤，一併傳給後端儲存
    const newTechnologies = getMultiselectCustom('add-tags-ms');

    try {
      const resp = await fetch(GAS_URL, {
        method:   "POST",
        headers:  { "Content-Type": "text/plain" },
        body:     JSON.stringify({ action: "addProduct", product, devNote, newTechnologies }),
        redirect: "follow"
      });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      // 上傳圖片（若有）
      const newProductId = data.productId;
      if (newProductId) {
        const toAdd = _editMediaState.items.filter(i => !i.markedForDeletion);
        for (let i = 0; i < toAdd.length; i++) {
          btn.textContent = `上傳圖片中… (${i + 1}/${toAdd.length})`;
          const item = toAdd[i];
          await fetch(GAS_URL, {
            method:   "POST",
            headers:  { "Content-Type": "text/plain" },
            body:     JSON.stringify({
              action:      "uploadProductImage",
              productId:   String(newProductId),
              imageBase64: item.base64,
              mimeType:    item.mimeType,
              description: item.description,
              order:       i
            }),
            redirect: "follow"
          });
        }
      }

      // 新增成功：重新載入食譜列表（包含新技術標籤）
      recipesState.loaded = false;
      closeRecipeDetail();
      loadRecipes();
    } catch (err) {
      btn.disabled    = false;
      btn.textContent = "新增";
      const errEl = document.createElement("div");
      errEl.className       = "error-msg";
      errEl.style.marginTop = "12px";
      errEl.textContent     = "⚠️ 新增失敗：" + err.message;
      btn.closest(".recipe-edit-actions").insertAdjacentElement("afterend", errEl);
    }
  }

  function renderCarousel() {
    const carousel = document.getElementById("recipe-modal-carousel");
    const media    = carouselState.media;

    if (!media.length) {
      carousel.innerHTML = '<div class="carousel-no-content">尚無內容</div>';
      return;
    }

    const cur  = carouselState.current;
    const item = media[cur];
    const dots = media.map((_, i) =>
      `<span class="carousel-dot${i === cur ? " active" : ""}"></span>`
    ).join("");

    const prevBtn = media.length > 1
      ? `<button class="carousel-arrow carousel-arrow-left" onclick="carouselNav(-1)">‹</button>` : "";
    const nextBtn = media.length > 1
      ? `<button class="carousel-arrow carousel-arrow-right" onclick="carouselNav(1)">›</button>` : "";
    const caption = item.description
      ? `<div class="carousel-caption">${escapeHTML(item.description)}</div>` : "";

    carousel.innerHTML = `
      <div class="carousel-img-area">
        ${prevBtn}
        <img class="carousel-img zoomable" src="${escapeHTML(item.imageUrl)}"
             alt="${escapeHTML(item.description || "")}"
             title="點擊放大"
             onclick="openLightbox(${cur})"
             onerror="this.style.display='none'">
        ${nextBtn}
        <div class="carousel-dots">${dots}</div>
      </div>
      ${caption}
    `;
  }

  function carouselNav(dir) {
    const len = carouselState.media.length;
    carouselState.current = (carouselState.current + dir + len) % len;
    renderCarousel();
  }
</script>
