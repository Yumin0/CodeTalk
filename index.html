<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeTalk 程式語言轉譯器</title>
  <!-- Markdown renderer -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #FEE6C9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 60px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .header-left h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .header-left .subtitle {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
      display: block;
    }

    /* ── Page nav ── */
    .header-nav {
      display: flex;
      gap: 6px;
    }

    .nav-btn {
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .nav-btn:hover { background: #f5f5f5; }

    .nav-btn.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    /* ── Mode cards ── */
    .mode-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .mode-card {
      background: #fff;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .mode-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .mode-card.active-error {
      border-color: #E85B4A;
    }

    .mode-card.active-explain {
      border-color: #4CAF50;
    }

    .mode-card.active-term {
      border-color: #5B8AE8;
    }

    .mode-card .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .dot-red   { background: #E85B4A; }
    .dot-green { background: #4CAF50; }
    .dot-blue  { background: #5B8AE8; }

    .mode-card .mode-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .mode-card .mode-desc {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    /* ── Input area ── */
    .input-block {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .input-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-label-row .label-text {
      font-size: 13px;
      color: #444;
      font-weight: 500;
    }

    .input-label-row .badge {
      font-size: 11px;
      background: #FEE6C9;
      color: #c0622a;
      border-radius: 5px;
      padding: 2px 7px;
      font-weight: 600;
    }

    .input-label-row .hint {
      font-size: 11px;
      color: #bbb;
    }

    textarea {
      width: 100%;
      background: #1a1a1a;
      color: #ff7b7b;
      font-family: "SFMono-Regular", "Consolas", "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.6;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      min-height: 120px;
    }

    textarea::placeholder {
      color: #555;
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
    }

    .char-count {
      font-size: 12px;
      color: #aaa;
    }

    .btn-submit {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-submit:hover:not(:disabled) {
      opacity: 0.8;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Loading ── */
    .loading-dots span {
      animation: blink 1.2s infinite;
      font-size: 18px;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 1; }
    }

    /* ── Result block ── */
    #result-block {
      display: none;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #f5f5f5;
    }

    .result-header .result-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .result-header .result-title::before {
      content: "●";
      color: #4CAF50;
      margin-right: 6px;
      font-size: 10px;
    }

    .btn-copy {
      background: #f4f4f4;
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #444;
      transition: background 0.15s;
    }

    .btn-copy:hover { background: #e8e8e8; }
    .btn-copy.copied { color: #4CAF50; }

    .btn-save {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-save:hover:not(:disabled) { opacity: 0.75; }
    .btn-save:disabled { opacity: 0.45; cursor: not-allowed; }

    .save-toast {
      display: none;
      margin-top: 10px;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
    }

    .save-toast.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .save-toast.error {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
    }

    .result-body {
      padding: 16px;
    }

    /* Section labels */
    .section-label {
      display: inline-block;
      background: #f4f4f4;
      color: #555;
      font-size: 11px;
      font-weight: 600;
      border-radius: 5px;
      padding: 3px 8px;
      margin-bottom: 8px;
    }

    .section-text {
      font-size: 14px;
      color: #222;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    /* highlight spans */
    .hi { color: #E85B4A; font-weight: 600; }

    /* numbered steps */
    .steps-list {
      list-style: none;
      padding: 0;
      margin-bottom: 16px;
    }

    .steps-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: #222;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .step-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    /* tip box */
    .tip-box {
      background: #FFF9EC;
      border-left: 3px solid #f5c842;
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .tip-icon {
      flex-shrink: 0;
      font-size: 15px;
    }

    /* Markdown rendered output */
    .md-body {
      font-size: 14px;
      color: #222;
      line-height: 1.8;
      word-break: break-word;
    }

    .md-body h1, .md-body h2, .md-body h3 {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 14px 0 6px;
    }

    .md-body h1 { font-size: 16px; }

    .md-body p { margin-bottom: 10px; }

    .md-body ul, .md-body ol {
      padding-left: 20px;
      margin-bottom: 10px;
    }

    .md-body li { margin-bottom: 4px; }

    .md-body code {
      background: #f4f4f4;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "SFMono-Regular", "Consolas", monospace;
      font-size: 12px;
      color: #E85B4A;
    }

    .md-body pre {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .md-body pre code {
      background: none;
      color: #a5d6a7;
      padding: 0;
      font-size: 12px;
    }

    .md-body strong { font-weight: 700; color: #1a1a1a; }
    .md-body em     { color: #666; }

    .md-body hr {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 12px 0;
    }

    /* raw text fallback (should rarely be used now) */
    #result-raw {
      font-size: 14px;
      color: #222;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Notes page ── */
    #notes-page { display: none; }

    .notes-empty {
      text-align: center;
      padding: 60px 0;
      color: #aaa;
      font-size: 14px;
    }

    .notes-week-header {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      margin: 18px 0 8px 4px;
      letter-spacing: 0.3px;
    }

    .notes-week-header:first-child {
      margin-top: 0;
    }

    .note-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .note-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    .note-card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .note-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .note-icon-term  { background: #efefef; }
    .note-icon-code  { background: #efefef; }
    .note-icon-error { background: #fde8e8; }

    .note-card-body {
      flex: 1;
      min-width: 0;
    }

    .note-title {
      font-size: 15px;
      font-weight: 600;
      color: #222;
      line-height: 1.4;
      margin-bottom: 5px;
      word-break: break-word;
    }

    .note-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .note-date {
      font-size: 12px;
      color: #aaa;
      flex-shrink: 0;
    }

    .note-chevron {
      font-size: 14px;
      color: #bbb;
      flex-shrink: 0;
      margin-top: 2px;
      transition: transform 0.2s;
    }

    .note-card.expanded .note-chevron { transform: rotate(180deg); }

    .tag-chip {
      font-size: 11px;
      border-radius: 4px;
      padding: 2px 7px;
    }

    .tag-chip-term  { background: #e8eefe; color: #5B8AE8; }
    .tag-chip-code  { background: #e8f5e9; color: #388e3c; }
    .tag-chip-error { background: #fde8e8; color: #E85B4A; }

    .note-detail {
      display: none;
      margin-top: 14px;
      border-top: 1px solid #f0f0f0;
      padding-top: 14px;
    }

    .note-card.expanded .note-detail { display: block; }

    .note-section-label {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .note-input-box {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: #444;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 14px;
      font-family: "SFMono-Regular", "Consolas", monospace;
    }

    .note-input-box-error {
      background: #111827;
      color: #ff8c42;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 14px;
      font-family: "SFMono-Regular", "Consolas", monospace;
    }

    .note-input-box-label {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .note-output-box {
      margin-bottom: 8px;
    }

    .note-output-box h1,
    .note-output-box h2,
    .note-output-box h3,
    .note-output-box h4,
    .note-output-box h5,
    .note-output-box h6 {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f0ece8;
      border-radius: 999px;
      padding: 4px 14px 4px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #3d3530;
      margin: 14px 0 8px;
      line-height: 1.5;
    }

    .note-output-box .md-body p:has(> strong:only-child) {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f0ece8;
      border-radius: 999px;
      padding: 4px 14px 4px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #3d3530;
      margin: 14px 0 8px;
      line-height: 1.5;
    }

    .note-output-box .md-body p:has(> strong:only-child) strong {
      font-weight: 600;
      color: inherit;
    }

    .note-output-box blockquote {
      background: #fffbeb;
      border-left: none;
      border-radius: 10px;
      padding: 11px 14px;
      margin: 8px 0;
      font-size: 13px;
      color: #555;
    }

    .note-output-box blockquote::before {
      content: "💡 ";
    }

    .note-output-box blockquote p {
      display: inline;
      margin: 0;
    }

    /* error state */
    .error-msg {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #c0392b;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>CodeTalk</h1>
      <span class="subtitle">程式語言轉譯器</span>
    </div>
    <div class="header-nav">
      <button class="nav-btn active" id="nav-translate" onclick="switchPage('translate')">● 轉譯</button>
      <button class="nav-btn" id="nav-notes" onclick="switchPage('notes')">📔 我的筆記</button>
    </div>
  </div>

  <!-- ── 轉譯頁面 ── -->
  <div id="translate-page">

  <!-- Mode selector -->
  <div class="mode-row">
    <div class="mode-card active-error" id="card-error" onclick="setMode('error')">
      <div class="mode-title"><span class="dot dot-red"></span>錯誤訊息</div>
      <div class="mode-desc">貼上紅字<br>告訴你哪裡出問題</div>
    </div>
    <div class="mode-card" id="card-explain" onclick="setMode('explain')">
      <div class="mode-title"><span class="dot dot-green"></span>程式碼解讀</div>
      <div class="mode-desc">貼上看不懂的程式<br>用人話解釋</div>
    </div>
    <div class="mode-card" id="card-term" onclick="setMode('term')">
      <div class="mode-title"><span class="dot dot-blue"></span>名詞解釋</div>
      <div class="mode-desc">貼入技術名詞<br>用白話說明</div>
    </div>
  </div>

  <!-- Input block -->
  <div class="input-block">
    <div class="input-label-row">
      <span class="label-text" id="input-label">貼上錯誤訊息</span>
      <span class="badge" id="input-badge">Error</span>
      <span class="hint">Cmd+V 貼上</span>
    </div>
    <textarea id="user-input" placeholder="TypeError: Cannot read properties of undefined&#10;(reading 'map')&#10;at ProductList.jsx:24" rows="6"></textarea>
    <div class="input-footer">
      <span class="char-count" id="char-count">0 字</span>
      <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">
        幫我翻譯 →
      </button>
    </div>
  </div>

  <!-- Result block -->
  <div id="result-block">
    <div class="result-header">
      <span class="result-title">白話解釋</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn-copy" id="btn-copy" onclick="copyResult()">複製</button>
        <button class="btn-save" id="btn-save" onclick="saveNote()">存筆記</button>
      </div>
    </div>
    <div class="result-body" id="result-body">
      <!-- Populated by JS -->
    </div>
    <div class="save-toast" id="save-toast"></div>
  </div>

  </div><!-- /translate-page -->

  <!-- ── 筆記頁面 ── -->
  <div id="notes-page">
    <div id="notes-list">
      <div class="notes-empty">載入中…</div>
    </div>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  // Replace this with your deployed GAS Web App URL
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyK1g8nFMiRmpvkPniBASDUWbgglS8P0eIkIV8hMPm1f8sY_RxP3Ja6iGB9ukdJukIvQQ/exec";

  // ── State ────────────────────────────────────────────────────────────────
  let currentMode  = "error";
  let currentInput = "";

  // ── Mode switching ────────────────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    const cardError   = document.getElementById("card-error");
    const cardExplain = document.getElementById("card-explain");
    const cardTerm    = document.getElementById("card-term");
    const label       = document.getElementById("input-label");
    const badge       = document.getElementById("input-badge");
    const ta          = document.getElementById("user-input");

    // Reset all cards
    cardError.className   = "mode-card";
    cardExplain.className = "mode-card";
    cardTerm.className    = "mode-card";

    if (mode === "error") {
      cardError.className = "mode-card active-error";
      label.textContent = "貼上錯誤訊息";
      badge.textContent = "Error";
      badge.style.background = "#FEE6C9";
      badge.style.color      = "#c0622a";
      ta.style.color = "#ff7b7b";
      ta.placeholder = "TypeError: Cannot read properties of undefined\n(reading 'map')\nat ProductList.jsx:24";
    } else if (mode === "explain") {
      cardExplain.className = "mode-card active-explain";
      label.textContent = "貼上程式碼";
      badge.textContent = "Code";
      badge.style.background = "#e8f5e9";
      badge.style.color      = "#2e7d32";
      ta.style.color = "#a5d6a7";
      ta.placeholder = "// 貼上你看不懂的程式碼...";
    } else {
      cardTerm.className = "mode-card active-term";
      label.textContent = "貼上技術名詞";
      badge.textContent = "Term";
      badge.style.background = "#e8eefe";
      badge.style.color      = "#2d4faa";
      ta.style.color = "#8eadee";
      ta.placeholder = "CORS\nendpoint\nrequest body";
    }

    // Clear previous result
    document.getElementById("result-block").style.display = "none";
  }

  // ── Char counter ─────────────────────────────────────────────────────────
  document.getElementById("user-input").addEventListener("input", function () {
    document.getElementById("char-count").textContent = this.value.length + " 字";
  });

  // ── Submit ───────────────────────────────────────────────────────────────
  async function handleSubmit() {
    const input = document.getElementById("user-input").value.trim();
    if (!input) return;

    currentInput = input;

    const btn = document.getElementById("btn-submit");
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-dots"><span>●</span><span>●</span><span>●</span></span>';

    // Show result block with loading
    const resultBlock = document.getElementById("result-block");
    const resultBody  = document.getElementById("result-body");
    resultBlock.style.display = "block";
    resultBody.innerHTML = '<p style="color:#aaa;font-size:14px;">翻譯中，請稍候…</p>';
    hideSaveToast();

    try {
      // 使用 text/plain 避免 CORS preflight（GAS Web App 不處理 OPTIONS）
      // GAS 的 doPost 仍會收到完整 JSON 字串並正常解析
      const resp = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "translate", mode: currentMode, content: input }),
        redirect: "follow"
      });

      if (!resp.ok) throw new Error("HTTP " + resp.status);

      const data = await resp.json();

      if (data.error) throw new Error(data.error);

      renderResult(data.result, currentMode);
    } catch (err) {
      resultBody.innerHTML = `<div class="error-msg">⚠️ 發生錯誤：${err.message}<br><small>請確認 GAS Web App URL 是否設定正確。</small></div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = "幫我翻譯 →";
    }
  }

  // ── Render result ────────────────────────────────────────────────────────
  function renderResult(text, mode) {
    const resultBody = document.getElementById("result-body");

    // Render as Markdown (MaiAgent returns Markdown-formatted replies)
    if (typeof marked !== "undefined") {
      marked.setOptions({
        breaks: true,   // treat single newlines as <br>
        gfm: true       // GitHub Flavored Markdown
      });
      resultBody.innerHTML = `<div class="md-body">${marked.parse(text)}</div>`;
    } else {
      // Fallback if CDN fails to load
      resultBody.innerHTML = `<div id="result-raw">${escapeHTML(text)}</div>`;
    }

    // Store raw text for copy button
    window._lastResultText = text;
  }

  // ── Copy ─────────────────────────────────────────────────────────────────
  function copyResult() {
    const text = window._lastResultText || "";
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("btn-copy");
      btn.textContent = "已複製 ✓";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "複製";
        btn.classList.remove("copied");
      }, 2000);
    });
  }

  // ── Save note ─────────────────────────────────────────────────────────────
  async function saveNote() {
    const output = window._lastResultText || "";
    if (!output || !currentInput) {
      showSaveToast("請先完成翻譯再存筆記", "error");
      return;
    }

    // Map frontend mode to sheet type value
    const typeMap = { error: "error", explain: "code", term: "term" };
    const type    = typeMap[currentMode] || currentMode;

    const btn = document.getElementById("btn-save");
    btn.disabled = true;
    btn.textContent = "儲存中…";
    hideSaveToast();

    try {
      const resp = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "saveNote", type, input: currentInput, output }),
        redirect: "follow"
      });

      if (!resp.ok) throw new Error("HTTP " + resp.status);

      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      showSaveToast("已存入筆記 ✓", "success");
    } catch (err) {
      showSaveToast("儲存失敗：" + err.message, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "存筆記";
    }
  }

  function showSaveToast(msg, type) {
    const el = document.getElementById("save-toast");
    el.textContent  = msg;
    el.className    = "save-toast " + type;
    el.style.display = "block";
    if (type === "success") {
      setTimeout(hideSaveToast, 3000);
    }
  }

  function hideSaveToast() {
    const el = document.getElementById("save-toast");
    el.style.display = "none";
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function escapeHTML(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function highlightCode(str) {
    // Wrap backtick strings with .hi class
    return str.replace(/`([^`]+)`/g, '<span class="hi">$1</span>');
  }

  // ── Page switching ─────────────────────────────────────────────────────────
  function switchPage(page) {
    const isNotes = page === "notes";
    document.getElementById("translate-page").style.display = isNotes ? "none" : "block";
    document.getElementById("notes-page").style.display    = isNotes ? "block" : "none";
    document.getElementById("nav-translate").classList.toggle("active", !isNotes);
    document.getElementById("nav-notes").classList.toggle("active", isNotes);
    if (isNotes) loadNotes();
  }

  // ── Notes page ─────────────────────────────────────────────────────────────

  const SECTION_ICONS = [
    { keywords: ["發生了什麼", "發生什麼", "是什麼", "什麼是"], icon: "🔴" },
    { keywords: ["去哪裡找", "去哪找", "怎麼修", "修復", "修"], icon: "🔧" },
    { keywords: ["生活化比喻", "比喻", "小比喻"], icon: "💡" },
    { keywords: ["小提示", "提示", "注意"], icon: "💡" },
    { keywords: ["vibe coding", "情境", "使用情境", "在 vibe"], icon: "💻" },
    { keywords: ["需要懂到", "需要懂", "懂到什麼程度", "懂多少"], icon: "🎯" },
    { keywords: ["在做什麼", "做什麼", "這段程式", "這段"], icon: "📋" },
    { keywords: ["關鍵步驟", "關鍵邏輯", "關鍵", "邏輯"], icon: "⚙️" },
    { keywords: ["潛在問題", "問題", "可能問題", "注意事項"], icon: "⚠️" },
  ];

  function getSectionIcon(text) {
    const t = text.toLowerCase();
    for (const entry of SECTION_ICONS) {
      if (entry.keywords.some(k => t.includes(k.toLowerCase()))) return entry.icon;
    }
    return "▸";
  }

  function applyNoteSectionIcons(container) {
    container.querySelectorAll(".note-output-box .md-body h1, .note-output-box .md-body h2, .note-output-box .md-body h3").forEach(h => {
      if (h.dataset.iconized) return;
      h.dataset.iconized = "1";
      const text = h.textContent.trim();
      const icon = getSectionIcon(text);
      const iconSpan = document.createElement("span");
      iconSpan.textContent = icon;
      iconSpan.style.fontSize = "12px";
      h.textContent = text;
      h.insertBefore(iconSpan, h.firstChild);
    });
  }

  const TYPE_META = {
    error: { iconClass: "note-icon-error", icon: "🚨", color: "#E85B4A" },
    code:  { iconClass: "note-icon-code",  icon: "🔍", color: "#4CAF50" },
    term:  { iconClass: "note-icon-term",  icon: "🔍", color: "#5B8AE8" }
  };

  function getNoteTitle(n) {
    const text = n.input.replace(/\n/g, " ").trim();
    if (n.type === "term") return text.slice(0, 30) + " 是什麼？";
    return text.slice(0, 60);
  }

  async function loadNotes() {
    const list = document.getElementById("notes-list");
    list.innerHTML = '<div class="notes-empty">載入中…</div>';
    try {
      const resp = await fetch(GAS_URL + "?action=getNotes", { redirect: "follow" });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      renderNotes(data.notes || []);
    } catch (err) {
      list.innerHTML = `<div class="notes-empty">載入失敗：${escapeHTML(err.message)}</div>`;
    }
  }

  function getWeekGroup(createdAt) {
    if (!createdAt) return "更早";
    const noteDate = new Date(createdAt.replace(" ", "T"));
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // Start of this week (Monday)
    const thisWeekStart = new Date(today);
    thisWeekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7));

    // Start of last week (Monday)
    const lastWeekStart = new Date(thisWeekStart);
    lastWeekStart.setDate(thisWeekStart.getDate() - 7);

    if (noteDate >= thisWeekStart) return "本週";
    if (noteDate >= lastWeekStart) return "上週";
    return "更早";
  }

  function renderNotes(notes) {
    const list = document.getElementById("notes-list");
    if (!notes.length) {
      list.innerHTML = '<div class="notes-empty">還沒有筆記，先去翻譯一些東西吧！</div>';
      return;
    }

    function noteCardHTML(n) {
      const meta    = TYPE_META[n.type] || TYPE_META.error;
      const dateStr = n.created_at ? n.created_at.slice(5, 10).replace("-", "/") : "";
      const title   = getNoteTitle(n);
      const tags    = n.tags ? n.tags.split(",").filter(Boolean) : [];
      const chipClass = `tag-chip tag-chip-${n.type || "error"}`;

      const tagHTML = tags.map(t =>
        `<span class="${chipClass}">${escapeHTML(t.trim())}</span>`
      ).join("");

      const outputHTML = typeof marked !== "undefined"
        ? `<div class="md-body">${marked.parse(n.output)}</div>`
        : `<div style="white-space:pre-wrap;font-size:14px;color:#222">${escapeHTML(n.output)}</div>`;

      return `
        <div class="note-card" id="nc-${n.id}" onclick="toggleNoteCard('${n.id}')">
          <div class="note-card-header">
            <div class="note-icon ${meta.iconClass}">${meta.icon}</div>
            <div class="note-card-body">
              <div class="note-title">${escapeHTML(title)}</div>
              <div class="note-meta">
                <span class="note-date">${dateStr}</span>
                ${tagHTML}
              </div>
            </div>
            <span class="note-chevron">▾</span>
          </div>
          <div class="note-detail">
            ${n.type === 'error'
              ? `<div class="note-input-box-error"><div class="note-input-box-label">原始錯誤訊息</div>${escapeHTML(n.input)}</div>`
              : `<div class="note-input-box">${escapeHTML(n.input)}</div>`
            }
            <div class="note-output-box">${outputHTML}</div>
          </div>
        </div>`;
    }

    const groups = { "本週": [], "上週": [], "更早": [] };
    notes.forEach(n => groups[getWeekGroup(n.created_at)].push(n));

    let html = "";
    ["本週", "上週", "更早"].forEach(label => {
      if (!groups[label].length) return;
      html += `<div class="notes-week-header">${label}</div>`;
      html += groups[label].map(noteCardHTML).join("");
    });

    list.innerHTML = html;
    applyNoteSectionIcons(list);
  }

  function toggleNoteCard(id) {
    const card = document.getElementById("nc-" + id);
    if (card) card.classList.toggle("expanded");
  }
</script>
</body>
